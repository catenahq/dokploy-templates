name: Trivy config (rendered compose)

# Wave 4 (blocking) IaC gate. Scans the rendered Dokploy blueprints
# under blueprints/<id>/docker-compose.yml for known-bad base images
# + misconfigurations. Trivy treats compose files as IaC and flags
# things like privileged: true, host networking, outdated tags, etc.
#
# Promoted from report-only on 2026-05-24 (Wave 4). Severity floor
# HIGH+CRITICAL, exit-code:1.

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: '43 6 * * 1'

permissions:
  contents: read

jobs:
  trivy-config:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: 'config'
          scan-ref: 'blueprints'
          severity: HIGH,CRITICAL
          exit-code: '1'
          format: 'json'
          output: 'trivy-config.json'
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: trivy-config-report
          path: trivy-config.json
          if-no-files-found: ignore
