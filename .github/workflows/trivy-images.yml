name: Trivy images (catalog)

# Image-CVE scan against every container ref in source/compose/*.compose.yml.
# Complements the existing trivy.yml (which scans the rendered blueprints as
# IaC config -- privileged/host-net/etc. -- and does NOT touch base-image
# OS package CVEs).
#
# Triggers:
#   - pull_request: gate any catalog image bump on CVE delta before merge
#   - push main: post-merge baseline
#   - schedule daily 06:23 UTC: catch CVEs disclosed between PRs.
#     Offsets from trivy.yml's `43 6 * * 1` so the two crons don't queue
#     head-to-head.
#
# Severity floor: HIGH+CRITICAL with ignore-unfixed so unpatched upstream
# CVEs do not block until a fix exists. Tune via .trivyignore at repo root.

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: '23 6 * * *'

permissions:
  contents: read

jobs:
  list-images:
    name: Enumerate catalog images
    runs-on: ubuntu-latest
    outputs:
      images: ${{ steps.list.outputs.images }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - name: List images from source/compose/
        id: list
        run: |
          set -euo pipefail
          mapfile -t imgs < <(uv run build/list_images.py)
          json=$(printf '%s\n' "${imgs[@]}" | jq -R . | jq -cs .)
          echo "images=$json" >> "$GITHUB_OUTPUT"
          echo "Scanning ${#imgs[@]} unique images:"
          printf '  %s\n' "${imgs[@]}"

  trivy-image:
    name: Trivy ${{ matrix.image }}
    needs: list-images
    runs-on: ubuntu-latest
    env:
      # Optional: set DOCKERHUB_USERNAME + DOCKERHUB_TOKEN repo secrets to
      # authenticate pulls and lift Docker Hub's anonymous rate limit (the
      # cause of the intermittent i/o-timeout scan failures). Absent ->
      # anonymous pulls, same as before.
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
    strategy:
      fail-fast: false
      matrix:
        image: ${{ fromJSON(needs.list-images.outputs.images) }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - name: Docker Hub login (lifts the pull rate limit; skipped if no secret)
        if: env.DOCKERHUB_USERNAME != ''
        env:
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
      - name: Sanitize image name for artifact path
        id: slug
        env:
          # matrix.image is repo-controlled, but route it through an env var
          # rather than interpolating ${{ }} into the run: script (zizmor
          # template-injection: untrusted-context-into-shell sink).
          IMAGE: ${{ matrix.image }}
        run: |
          slug=$(echo "$IMAGE" | tr '/:.' '___')
          echo "slug=$slug" >> "$GITHUB_OUTPUT"
      - uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        # Report-only matrix: a transient scan/pull error (e.g. Docker Hub
        # i/o timeout or anonymous rate-limit) must NOT fail the gate -- only
        # exit-code:0 below suppresses FINDING-based failures, not trivy's own
        # FATAL on image init. continue-on-error makes the 'never fails'
        # posture actually hold; the per-image JSON artifact still uploads.
        continue-on-error: true
        with:
          image-ref: ${{ matrix.image }}
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          # REPORT-ONLY for catalog images. Upstream maintainers (nextcloud,
          # rocketchat, frappe, etc.) own the base-layer rebuild cadence;
          # findings here are almost always vendored libssl / glibc / Go
          # stdlib / Java stdlib CVEs we cannot patch from this repo
          # without bumping the entire tag -- and aggressive bumps break
          # compose compatibility (postgres major, mongo replica-set, etc).
          # Daily cron still uploads the report + opens a GitHub issue on
          # delta; operator triages on cadence + Renovate proposes bumps.
          # For images we OWN (catena-admin) the gate stays at exit-code:1
          # in ops/.github/workflows/trivy.yml.
          exit-code: '0'
          format: 'json'
          output: 'trivy-${{ steps.slug.outputs.slug }}.json'
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: trivy-image-${{ steps.slug.outputs.slug }}
          path: trivy-${{ steps.slug.outputs.slug }}.json
          if-no-files-found: ignore

  # NB: a previous `open-issue-on-cron-failure` job was wired to
  # `if: failure() && github.event_name == 'schedule'`. With the
  # report-only posture (exit-code: '0') the matrix never fails, so
  # that condition would never trigger. Removed rather than rewritten:
  # the per-image JSON artifacts uploaded above are the canonical
  # finding surface, and Renovate's docker-compose manager handles
  # the proactive bump cadence. Operator triages by spot-checking
  # the Actions tab + Dependency Dashboard. If a notification surface
  # becomes necessary later, the right shape is a separate
  # post-matrix aggregator job that reads `Results[].Vulnerabilities`
  # from the JSON artifacts and posts a summary -- not a re-enable
  # of the old failure-conditional opener.
