# WordPress nginx config — front door for the wordpress.compose.yml stack.
#
# Loaded by nginx:alpine at /etc/nginx/nginx.conf via the compose
# `configs:` block, REPLACING the distro default. We need the whole
# file (not just a server snippet) because the `user` directive lives
# in the main context.
#
# UID alignment for FastCGI cache purge:
#   nginx workers and php-fpm workers BOTH run as www-data (uid 82).
#   The compose nginx entrypoint creates www-data:82 before nginx
#   starts; this file then directs nginx to drop workers to that user.
#   php-fpm-alpine already creates www-data:82 in the wordpress image.
#   With matching UIDs, NPP (running under php-fpm) can unlink cache
#   files written by nginx workers without permission errors.
#
# Cache key:
#   $scheme$request_method$host$request_uri  -- per-hostname, so two
#   WordPress installs cannot collide on this cache zone.

user www-data;
worker_processes auto;
pid /var/run/nginx.pid;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'cache=$upstream_cache_status';
    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;

    fastcgi_cache_path /var/cache/nginx/fastcgi
        levels=1:2
        keys_zone=WORDPRESS:100m
        inactive=60m
        max_size=512m
        use_temp_path=off;
    fastcgi_cache_key "$scheme$request_method$host$request_uri";

    map $http_cookie $skip_cache_cookie {
        default                       0;
        ~*comment_author              1;
        ~*wordpress_logged_in         1;
        ~*wp-postpass                 1;
        ~*woocommerce_items_in_cart   1;
        ~*woocommerce_cart_hash       1;
        ~*wp_woocommerce_session      1;
    }

    map $request_uri $skip_cache_uri {
        default                       0;
        ~*/wp-admin/                  1;
        ~*/wp-[^/]+\.php$             1;
        ~*/xmlrpc\.php                1;
        ~*/feed/                      1;
        ~*\?.+                        1;
    }

    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;

        root /var/www/html;
        index index.php index.html;

        client_max_body_size 64M;

        set $skip_cache 0;
        if ($skip_cache_cookie)     { set $skip_cache 1; }
        if ($skip_cache_uri)        { set $skip_cache 1; }
        if ($request_method = POST) { set $skip_cache 1; }

        location = /favicon.ico { log_not_found off; access_log off; }
        location = /robots.txt  { log_not_found off; access_log off; allow all; }

        location ~* \.(jpg|jpeg|png|gif|ico|svg|webp|avif|css|js|woff|woff2|ttf|eot|mp4|webm|pdf)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
            access_log off;
            try_files $uri =404;
        }

        location / {
            try_files $uri $uri/ /index.php?$args;
        }

        location ~ \.php$ {
            try_files $uri =404;
            include fastcgi_params;
            fastcgi_split_path_info ^(.+\.php)(/.+)$;
            fastcgi_pass wp:9000;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            fastcgi_param PATH_INFO       $fastcgi_path_info;
            fastcgi_read_timeout 300;

            fastcgi_cache WORDPRESS;
            fastcgi_cache_valid 200 60m;
            fastcgi_cache_valid 301 302 60m;
            fastcgi_cache_valid 404 5m;
            fastcgi_cache_use_stale error timeout invalid_header updating http_500 http_503;
            fastcgi_cache_background_update on;
            fastcgi_cache_lock on;
            fastcgi_cache_bypass $skip_cache;
            fastcgi_no_cache    $skip_cache;

            add_header X-FastCGI-Cache $upstream_cache_status;
        }

        location ~ /\.ht                                                  { deny all; }
        location ~* /(?:wp-config\.php|\.env|\.git|composer\.(json|lock))$ { deny all; }
    }
}
