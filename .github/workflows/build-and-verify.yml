name: build-and-verify

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  render-idempotency:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          enable-cache: true
      - name: Render
        run: uv run build/render.py
      - name: Verify no drift between source/ and blueprints/ + meta.json
        run: |
          if ! git diff --exit-code blueprints meta.json; then
            echo ""
            echo "render output drifted from committed artifacts."
            echo "Run 'uv run build/render.py' locally, commit the diff, push."
            exit 1
          fi

  unicode-hygiene:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "20"
      - name: check:unicode
        run: node scripts/check-unicode.mjs
