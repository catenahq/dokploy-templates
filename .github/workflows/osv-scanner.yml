name: OSV-Scanner (report-only)

# Wave 1 dependency-CVE gate. Uses Google's reusable workflow.
# upload-sarif=false (no GitHub Advanced Security on this org).
# fail-on-vuln=false keeps it report-only. Promote to blocking
# after baseline is acknowledged. See plan in ~/.claude/plans/.

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: '23 6 * * 1'

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  scan-scheduled:
    if: github.event_name != 'pull_request'
    uses: "google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@v2.3.8"
    with:
      upload-sarif: false
      fail-on-vuln: false

  scan-pr:
    if: github.event_name == 'pull_request'
    uses: "google/osv-scanner-action/.github/workflows/osv-scanner-reusable-pr.yml@v2.3.8"
    with:
      upload-sarif: false
      fail-on-vuln: false
