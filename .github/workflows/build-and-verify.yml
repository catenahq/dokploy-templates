name: build-and-verify

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  render-idempotency:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      - name: Render
        run: uv run build/render.py
      - name: Verify no drift between source/ and blueprints/ + meta.json
        run: |
          if ! git diff --exit-code blueprints meta.json; then
            echo ""
            echo "render output drifted from committed artifacts."
            echo "Run 'uv run build/render.py' locally, commit the diff, push."
            exit 1
          fi

  unicode-hygiene:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24"
      - name: Check required runner tools
        run: |
          missing=''
          for t in git; do command -v "$t" >/dev/null 2>&1 || missing="$missing $t"; done
          if [ -n "$missing" ]; then
            echo "::error::Required tool(s) missing on the runner:$missing"
            echo "::error::Install on the self-hosted runner: sudo apt-get install -y git -- see catenahq/ops internal_docs/operator/ci-runner-provisioning.md"
            exit 1
          fi
      - name: check:unicode
        run: node scripts/check-unicode.mjs

  lint-quiesce-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      - name: pytest tests/
        run: uv run --with pytest --with pyyaml pytest tests/ -q
      - name: lint quiesce snippets against the catalog
        run: uv run build/lint_quiesce.py
