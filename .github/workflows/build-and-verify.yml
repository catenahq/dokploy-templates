name: build-and-verify

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  render-idempotency:
    runs-on: [self-hosted, laptop]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - name: Render
        run: uv run build/render.py
      - name: Verify no drift between source/ and blueprints/ + meta.json
        run: |
          if ! git diff --exit-code blueprints meta.json; then
            echo ""
            echo "render output drifted from committed artifacts."
            echo "Run 'uv run build/render.py' locally, commit the diff, push."
            exit 1
          fi

  unicode-hygiene:
    runs-on: [self-hosted, laptop]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24"
      - name: check:unicode
        run: node scripts/check-unicode.mjs

  lint-quiesce-tests:
    runs-on: [self-hosted, laptop]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - name: pytest tests/
        run: uv run --with pytest --with pyyaml pytest tests/ -q
