---
# Dokploy "Templates" project catalog. Single source of truth consumed by:
#
#   - roles/infrastructure/tasks/dokploy_templates.yml  -> seeds the
#     compose entries into Dokploy at install time (the `compose_description`
#     field is what shows up in Dokploy's description column).
#   - operator-tools/generate-template-docs.py                  -> renders the
#     per-template client-docs pages + the index page (uses all fields).
#
# Each entry:
#   Shared fields (language-neutral):
#     id               -- stable key (used as sentinel key + Dokploy appName)
#     app_name         -- Dokploy compose name (short kebab-case)
#     upstream_url     -- upstream project website
#     sso_mode         -- enum: pre-wired | post-deploy-ui | jackson-curl | auto | none | n/a
#                        "pre-wired": zero post-deploy step, SSO works out of the box
#                        "post-deploy-ui": paste OIDC_* values in app's admin UI once
#                        "jackson-curl": one-time curl registers SSO via bundled Jackson broker
#                        "auto": operator's converge runs an idempotent post-deploy CLI hook
#                                (e.g. occ user_oidc:provider) to wire SSO; client never touches it
#                        "none": community edition doesn't support OIDC; users keep app-local login
#                        "n/a": no user login (server-to-server template like OnlyOffice)
#     domain_host      -- default hostname (Jinja-rendered at install)
#     domain_service   -- compose service name Traefik routes to
#     domain_port      -- internal port on that service
#     compose_file     -- path to the compose file on the controller
#     env_defaults     -- list of "KEY=value" strings for Dokploy's Environment tab
#     pg_replay_depends_on (optional) -- list of basenames whose pg_dump
#                        sections must replay BEFORE this one. Used by
#                        roles/backup/tasks/pg_replay.yml to topologically
#                        sort the per-db replay order. Names match the
#                        Postgres container basename (the part before
#                        the timestamp in <basename>-<ISO>.sql.gz). Most
#                        templates leave this unset (no cross-db deps);
#                        set it for apps whose data references another
#                        template's data.
#     pause_during_migrate_cutover (optional bool, default true) --
#                        whether `flows.migrate`'s pre-cutover quiesce
#                        step issues `docker pause` against this app's
#                        containers before taking the final snapshot.
#                        Default true (preserves in-memory state but
#                        stops writes mid-flush). Set to false ONLY for
#                        apps where pause is unsafe (long-running jobs,
#                        connection pools that don't survive freeze).
#                        See R20 in BACKLOG_TECHNICAL.md.
#     s3_reconcile (optional dict) -- declares a post-restore DB ↔ S3
#                        consistency check (R19 in BACKLOG_TECHNICAL.md). Apps
#                        that store primary file content in customer-
#                        owned S3 (Nextcloud objectstore, Outline
#                        attachments) keep their DB in restic but the
#                        S3 bucket is excluded by design. After a
#                        restore, the DB still indexes files; if the
#                        bucket is missing or rotated, the user sees
#                        broken links. The reconciliation step runs the
#                        declared command inside the app's container
#                        and reports any orphan rows. Shape:
#                            s3_reconcile:
#                              service: app          # compose service
#                              command: ["sh","-c","occ files:scan --all"]
#                              orphan_pattern: "^([0-9]+) errors?"
#                        Default: report-only (no DB mutations). Add
#                        a `delete_orphans: true` flag (off by default)
#                        to opt into destructive cleanup.
#     bench_pack (optional, default "nodb" inference) -- which
#                        BENCH_DEPLOY_PACK groups this template for the
#                        catena-ops test bench. Enum:
#                            postgres | mariadb | mongo | nodb | embedded
#                        Operators run the bench against one pack at a
#                        time (BENCH_DEPLOY_PACK=postgres) or against
#                        every template at once (BENCH_DEPLOY_PACK=all).
#                        Set this field explicitly per entry rather than
#                        relying on inference -- it makes pack membership
#                        reviewable in the catalog diff. "embedded" is
#                        for apps that ship their own DB inside the
#                        application container (onlyoffice bundles
#                        postgres/redis/rabbitmq; actualbudget uses
#                        sqlite); they have no externally-reachable DB
#                        service the bench can inject a row into, so
#                        the bench treats them like "nodb" for DB
#                        canaries but still runs the volume canary.
#     bench_fixture (optional, default "required") -- whether the
#                        catena-ops test bench requires a matching
#                        fixtures/<id>.yml file. Enum:
#                            required | skip
#                        "required" is the default; CI fails if the
#                        fixture file is missing. "skip" is for the
#                        rare template that has no persisted state worth
#                        round-tripping (e.g. collabora is a stateless
#                        document editor with no per-user data). The
#                        catalog entry MUST justify skip in a comment
#                        immediately above the field.
#   Per-language (en, fr) fields:
#     display_name        -- human-readable app name
#     what_it_is          -- one-line pitch
#     replaces            -- list of commercial apps this replaces (for "what does it do" positioning)
#     compose_description -- short text shown in Dokploy's description column:
#                           what/replaces/link to full docs. Keep it ~3 lines.
#     setup_steps         -- Markdown block of numbered steps to get running
#     extra_notes         -- optional Markdown block (for walk-throughs, tables, etc.)

dokploy_template_catalog:
  - id: nextcloud-s3-oidc
    app_name: nextcloud
    bench_pack: postgres
    upstream_url: https://nextcloud.com
    sso_mode: auto
    domain_host: "nextcloud.{{ cloudflare_zone }}"
    domain_service: app
    domain_port: 80
    # Per-template quiesce hooks. catena-daily's QUIESCE_PRE / QUIESCE_POST
    # stages render these snippets into /etc/catena/quiesce.d/<id>.{pre,post}.sh
    # at converge time (catena-quiesce-render, step 11). Nextcloud has a
    # built-in maintenance mode that blocks user writes while still
    # serving the admin -- enabling it before the backup pg_dumpall +
    # restic walk guarantees a consistent file-DB pair. occ runs as
    # www-data; `docker exec` against the `app` service is the
    # canonical Dokploy compose service name.
    quiesce_pre: "docker exec -u www-data $(docker ps -q -f label=com.docker.compose.service=app -f label=com.docker.compose.project~=nextcloud | head -1) php occ maintenance:mode --on"
    quiesce_post: "docker exec -u www-data $(docker ps -q -f label=com.docker.compose.service=app -f label=com.docker.compose.project~=nextcloud | head -1) php occ maintenance:mode --off"
    quiesce_timeout_seconds: 30
    # Talk + HPB signaling endpoint. aio-talk bundles
    # signaling+janus+nats; only its HTTP/WSS port (8081) is publicly
    # reachable. Ride the same wildcard CNAME at the Cloudflare layer
    # (signaling.<zone>) and let Traefik route to the talk-hpb
    # service via the Dokploy domain mapping.
    extra_domains:
      - host: "signaling.{{ cloudflare_zone }}"
        service: talk-hpb
        port: 8081
    compose_file: "compose/nextcloud-s3.compose.yml"
    # R19: Nextcloud objectstore stores the file content in customer-
    # owned S3, excluded from restic. After a restore, run `occ
    # files:scan --all` so Nextcloud reconciles its DB filecache
    # against what's actually in the bucket. occ exits non-zero +
    # logs counts of missing files when the bucket has rotated.
    s3_reconcile:
      service: app
      # nextcloud:apache image has no sudo; honor the user via
      # `docker exec -u www-data` (s3_reconcile.yml's argv builder
      # injects -u when this field is set). occ MUST run as
      # www-data so files-scan writes oc_filecache rows with the
      # right ownership.
      user: www-data
      command:
        - php
        - occ
        - files:scan
        - --all
      orphan_pattern: "\\\\| Errors\\\\s*\\\\|\\\\s*([0-9]+)\\\\s*\\\\|"
    # EP3: every operator-controlled OIDC env var is in
    # env_managed_keys so a converge auto-heals the discovery URL,
    # client ID, and client secret if a client edited them in the
    # Dokploy UI. Hostname/admin/db secrets are NOT managed (we want
    # client edits to survive). DO NOT add lookup('password', ...)
    # values to env_managed_keys -- Jinja re-evaluates on every
    # converge and minted-fresh-each-time would rotate secrets and
    # break the deployment.
    env_managed_keys:
      - OIDC_CLIENT_ID
      - OIDC_CLIENT_SECRET
      - OIDC_DISCOVERY_URL
      - OIDC_ISSUER_URL
      - OIDC_REDIRECT_URL
      # Talk + HPB (aio-talk) keys. Re-injected on every converge so
      # a client who edited the value in Dokploy UI cannot drift
      # these out of sync with the shared coturn secret + signaling
      # endpoint hostname. Match the `talk-hpb` service in
      # nextcloud-s3.compose.yml.
      - SIGNALING_HOSTNAME
      - SIGNALING_SECRET
      - TALK_INTERNAL_SECRET
      - TURN_HOSTNAME
      - TURN_STATIC_AUTH_SECRET
    env_defaults:
      - "NEXTCLOUD_HOSTNAME=nextcloud.{{ cloudflare_zone }}"
      - "NEXTCLOUD_ADMIN_USER=admin"
      - "NEXTCLOUD_ADMIN_PASSWORD={{ lookup('password', '/dev/null length=24 chars=ascii_letters,digits') }}"
      - "DB_PASSWORD={{ lookup('password', '/dev/null length=32 chars=ascii_letters,digits') }}"
      # S3 primary-storage coords. Defaults target the canonical
      # catena hot-tier (OVH BHS); operator overrides region/host
      # in the Dokploy UI for non-default deployments. Bucket name +
      # IAM creds are always per-client and stay blank in the
      # template so the operator must fill them before Deploy.
      - "S3_BUCKET="
      - "S3_REGION=bhs"
      - "S3_HOST=s3.bhs.io.cloud.ovh.net"
      - "S3_ACCESS_KEY="
      - "S3_SECRET_KEY="
      # OIDC env vars consumed by the post-deploy "Wire Nextcloud
      # OIDC" OliveTin button (script:
      # /usr/local/bin/catena-wire-nextcloud-oidc). These match
      # the Keycloak realm client (clientId=nextcloud, secret from
      # vault) and the Keycloak discovery URL. The script reads them
      # from inside the running container at click time.
      - "OIDC_CLIENT_ID=nextcloud"
      - "OIDC_CLIENT_SECRET={{ vault_nextcloud_oidc_client_secret }}"
      - "OIDC_DISCOVERY_URL=https://{{ keycloak_hostname | default('auth.' ~ cloudflare_zone) }}/realms/{{ keycloak_realm | default('vps') }}/.well-known/openid-configuration"
      - "OIDC_ISSUER_URL=https://{{ keycloak_hostname | default('auth.' ~ cloudflare_zone) }}/realms/{{ keycloak_realm | default('vps') }}"
      - "OIDC_REDIRECT_URL=https://nextcloud.{{ cloudflare_zone }}/apps/user_oidc/code"
      # Talk + HPB env. Auto-injected from the vault and inventory.
      # SIGNALING_HOSTNAME is the public hostname clients dial for the
      # WSS signaling endpoint (signaling.<base>, routed through
      # Cloudflare Tunnel + Traefik to the talk-hpb service:8081).
      # SIGNALING_SECRET is the bearer secret between aio-talk and
      # Talk; the wire script (catena-wire-nextcloud-talk-hpb) passes
      # this same value to `occ talk:signaling:add` so both ends
      # agree.
      # TALK_INTERNAL_SECRET is the internal-only secret between
      # aio-talk's signaling frontend and its backend store; never
      # leaves the container.
      # TURN_HOSTNAME / TURN_STATIC_AUTH_SECRET point Janus inside
      # aio-talk at the standalone coturn (turn.<base>:5349) for ICE
      # relay. Sharing the secret with Rocket.Chat's Jitsi consolidates
      # all media through one TURN provider.
      - "SIGNALING_HOSTNAME=signaling.{{ cloudflare_zone }}"
      - "SIGNALING_SECRET={{ vault_nextcloud_talk_signaling_secret }}"
      - "TALK_INTERNAL_SECRET={{ vault_nextcloud_talk_internal_secret }}"
      - "TURN_HOSTNAME={{ coturn_hostname | default('turn.' ~ cloudflare_zone) }}"
      - "TURN_STATIC_AUTH_SECRET={{ vault_turn_static_auth_secret }}"
    en:
      display_name: Nextcloud
      what_it_is: Self-hosted file sharing and collaboration -- the file hub that other templates plug into.
      replaces: ["Google Drive", "Dropbox", "OneDrive for Business"]
      compose_description: |
        Self-hosted file sharing + collaboration. Replaces Google Drive / Dropbox / OneDrive.

        First-time setup:
        1. Fill the S3_* variables in the Environment tab.
        2. Click Deploy.
        3. Open actions.<your-domain> and click "Wire Nextcloud OIDC" -- registers Keycloak SSO inside Nextcloud (idempotent, safe to re-click).
        4. Sign in with "Log in with keycloak" at your Nextcloud domain.

        Full docs: https://docs.catena.run/apps/nextcloud-s3-oidc/
      setup_steps: |
        1. Open the **Environment** tab and fill `S3_BUCKET`, `S3_REGION`, `S3_HOST`, `S3_ACCESS_KEY`, `S3_SECRET_KEY` with your bucket's coordinates. (Everything else is pre-filled -- `NEXTCLOUD_HOSTNAME`, admin/DB credentials, OIDC integration vars.)
        2. Click **Deploy**. Wait ~2 minutes for the first boot.
        3. Wire SSO: open `actions.<your-domain>` and click **Wire Nextcloud OIDC**. The button registers Keycloak as an OIDC provider inside Nextcloud (idempotent -- safe to re-click after redeploys or secret rotations).
        4. Sign in at your Nextcloud domain with **Log in with keycloak** (uses your operator-managed identity), or fall back to `NEXTCLOUD_ADMIN_USER` / `NEXTCLOUD_ADMIN_PASSWORD` from the Environment tab.
      extra_notes: |
        ### Sign-in with Keycloak -- wired by the OliveTin button

        After Nextcloud's first deploy you click **Wire Nextcloud
        OIDC** at `actions.<your-domain>`. The button enables
        Nextcloud's `user_oidc` app and registers a `keycloak`
        provider with the OIDC fields from the Environment tab. The
        Nextcloud login page then shows **Log in with keycloak** the
        next time you visit. Local admin login (`NEXTCLOUD_ADMIN_USER`
        / `NEXTCLOUD_ADMIN_PASSWORD`) keeps working alongside SSO as
        a break-glass.

        Re-click the button any time the OIDC configuration drifts
        (after a secret rotation, a destructive redeploy, etc.). It
        is idempotent -- re-running just refreshes the provider
        record.

        ### Sharing files by email link still works

        Keycloak SSO governs **user login** to Nextcloud. It does
        **not** restrict anonymous public share links --
        `/s/<token>` URLs your team generates from inside Nextcloud
        are reachable by recipients who have no Keycloak account.

        So the common workflow stays intact:

        1. A signed-in user (your team member) creates a share link
           in Nextcloud, optionally with a password and expiry date.
        2. Nextcloud emails the link to the recipient.
        3. The recipient clicks the link. Cloudflare Tunnel routes
           the request straight to Nextcloud; Nextcloud serves the
           public share page (or the password prompt, if you set
           one). No Keycloak redirect, no login required.

        This works because Nextcloud is reached via Nextcloud's own
        auth code, not a forward-auth proxy. The `user_oidc` plugin
        only handles the login flow for *your team members*; the
        public-share endpoints remain anonymous-by-design.

        If you ever need to lock down public shares entirely, the
        right control is inside Nextcloud (Settings -> Sharing ->
        "Allow share via public link"), not at the network layer.
    fr:
      display_name: Nextcloud
      what_it_is: Partage de fichiers et collaboration auto-hébergés -- le hub auquel d'autres templates se connectent.
      replaces: ["Google Drive", "Dropbox", "OneDrive Entreprise"]
      compose_description: |
        Partage de fichiers + collaboration auto-hébergés. Remplace Google Drive / Dropbox / OneDrive.

        Configuration initiale :
        1. Remplissez les variables S3_* dans l'onglet Environment.
        2. Cliquez sur Deploy.
        3. Ouvrez actions.<votre-domaine> et cliquez "Câbler l'OIDC pour Nextcloud" -- enregistre le SSO Keycloak dans Nextcloud (idempotent, peut être recliqué).
        4. Connectez-vous avec "Se connecter avec keycloak" sur votre domaine Nextcloud.

        Doc complète : https://docs.catena.run/apps/nextcloud-s3-oidc/
      setup_steps: |
        1. Ouvrez l'onglet **Environment** et remplissez `S3_BUCKET`, `S3_REGION`, `S3_HOST`, `S3_ACCESS_KEY`, `S3_SECRET_KEY` avec les coordonnées de votre seau S3. (Le reste est pré-rempli -- `NEXTCLOUD_HOSTNAME`, identifiants admin/DB, variables d'intégration OIDC.)
        2. Cliquez **Deploy**. Patientez ~2 min pour le premier démarrage.
        3. Câblez le SSO : ouvrez `actions.<votre-domaine>` puis cliquez **Câbler l'OIDC pour Nextcloud**. Le bouton enregistre Keycloak comme fournisseur OIDC à l'intérieur de Nextcloud (idempotent -- peut être recliqué sans risque après un redéploiement ou une rotation de secret).
        4. Connectez-vous sur votre domaine Nextcloud avec **Se connecter avec keycloak** (utilise votre identité gérée par l'opérateur), ou repli sur `NEXTCLOUD_ADMIN_USER` / `NEXTCLOUD_ADMIN_PASSWORD` de l'onglet Environment.
      extra_notes: |
        ### Connexion avec Keycloak -- câblée par le bouton OliveTin

        Après le premier déploiement de Nextcloud, vous cliquez
        **Câbler l'OIDC pour Nextcloud** sur
        `actions.<votre-domaine>`. Le bouton active l'application
        `user_oidc` de Nextcloud et enregistre un fournisseur
        `keycloak` avec les valeurs OIDC de l'onglet Environment. La
        page de connexion Nextcloud affiche alors **Se connecter
        avec keycloak** à votre prochaine visite. La connexion admin
        locale (`NEXTCLOUD_ADMIN_USER` / `NEXTCLOUD_ADMIN_PASSWORD`)
        continue de fonctionner en parallèle comme issue de secours.

        Recliquez le bouton chaque fois que la configuration OIDC
        dérive (après une rotation de secret, un redéploiement
        destructif, etc.). Il est idempotent -- relancer ne fait que
        rafraîchir l'enregistrement du fournisseur.

        ### Le partage de fichiers par lien courriel fonctionne toujours

        L'authentification Keycloak gouverne la **connexion des
        utilisateurs** à Nextcloud. Elle ne restreint **pas** les
        liens de partage publics anonymes -- les URL
        `/s/<jeton>` que votre équipe génère depuis Nextcloud
        restent accessibles aux destinataires qui n'ont pas de
        compte Keycloak.

        Le flux courant fonctionne donc tel quel :

        1. Un membre de votre équipe (utilisateur connecté) crée un
           lien de partage dans Nextcloud, avec un mot de passe et
           une date d'expiration s'il le souhaite.
        2. Nextcloud envoie le lien par courriel au destinataire.
        3. Le destinataire clique le lien. Cloudflare Tunnel
           achemine la requête directement à Nextcloud ; Nextcloud
           sert la page de partage publique (ou l'invite de mot de
           passe, si vous en avez défini un). Pas de redirection
           Keycloak, pas de connexion requise.

        Cela fonctionne parce que Nextcloud est atteint via son
        propre code d'authentification, pas via un proxy
        forward-auth. Le module `user_oidc` ne gère que le flux de
        connexion pour *les membres de votre équipe* ; les points
        d'accès des partages publics restent anonymes par
        conception.

        Si vous souhaitez verrouiller complètement les partages
        publics, le bon contrôle est à l'intérieur de Nextcloud
        (Paramètres -> Partage -> "Autoriser le partage par lien
        public"), pas au niveau réseau.

  # Both office editors target office.<base>. Only ONE is deployed
  # per client at install time (operator picks per format-fidelity
  # preference). Both seeded so the choice is a single click in
  # Dokploy. The companion OliveTin buttons (Wire Nextcloud Collabora
  # / Wire Nextcloud OnlyOffice) install + configure the matching
  # Nextcloud-side app and remove the OTHER editor's app cleanly,
  # so switching is reversible without leftover state.

  - id: collabora
    app_name: collabora
    bench_pack: nodb
    # bench_fixture: stateless document editor. No per-user data,
    # no DB, no volumes worth round-tripping through restic. The
    # restore-drill canary contract has nothing to verify on this
    # template, so the bench skips it entirely.
    bench_fixture: skip
    upstream_url: https://www.collaboraonline.com/
    sso_mode: n/a
    domain_host: "office.{{ cloudflare_zone }}"
    domain_service: collabora
    domain_port: 9980
    compose_file: "compose/collabora.compose.yml"
    # Collabora has no JWT secret -- WOPI hosts are matched against the
    # `domain` regex inside the compose env (nextcloud\..*).
    env_defaults: []
    en:
      display_name: Collabora Online (CODE)
      what_it_is: Collaborative ODT/DOCX/XLSX/PPTX editing -- bolts into Nextcloud for real-time co-editing. LibreOffice-based; lighter than OnlyOffice; better fidelity for ODF formats.
      replaces: ["Microsoft Office Online", "Google Docs (as embedded editor)"]
      compose_description: |
        LibreOffice-based collaborative editor. Embedded in Nextcloud. Lighter alternative to OnlyOffice; better ODF fidelity.

        https://docs.catena.run/apps/collabora/
      setup_steps: |
        1. Click **Deploy**. Wait ~30 s for the document server to boot.
        2. From the operator dashboard, click the **Wire Nextcloud Collabora** button. The button installs the Nextcloud Office app, points it at this server, and -- if you previously had OnlyOffice wired -- removes the OnlyOffice Nextcloud app cleanly.
        3. Open any DOCX/XLSX/PPTX/ODT file in Nextcloud. It opens in the embedded Collabora editor.

        Switching back to OnlyOffice later is one click: stop this Collabora compose, deploy `onlyoffice`, then click the **Wire Nextcloud OnlyOffice** button.

        Don't visit the Collabora domain directly in a browser -- it has no UI of its own. Users only ever see it through Nextcloud when they open a document.
      extra_notes: ""
    fr:
      display_name: Collabora Online (CODE)
      what_it_is: Édition collaborative ODT/DOCX/XLSX/PPTX -- s'intègre à Nextcloud pour la co-édition temps réel. Basé sur LibreOffice ; plus léger qu'OnlyOffice ; meilleure fidélité pour les formats ODF.
      replaces: ["Microsoft Office Online", "Google Docs (éditeur embarqué)"]
      compose_description: |
        Éditeur collaboratif basé sur LibreOffice. Embarqué dans Nextcloud. Alternative légère à OnlyOffice ; meilleure fidélité ODF.

        https://docs.catena.run/apps/collabora/
      setup_steps: |
        1. Cliquez **Deploy**. Patientez ~30 s le démarrage du serveur d'édition.
        2. Depuis le tableau de bord opérateur, cliquez le bouton **Wire Nextcloud Collabora**. Le bouton installe l'application Nextcloud Office, la pointe vers ce serveur, et -- si OnlyOffice était précédemment câblé -- retire proprement l'application Nextcloud OnlyOffice.
        3. Ouvrez n'importe quel fichier DOCX/XLSX/PPTX/ODT dans Nextcloud. Il s'ouvre dans l'éditeur Collabora embarqué.

        Pour revenir à OnlyOffice plus tard : arrêtez ce conteneur Collabora, déployez `onlyoffice`, puis cliquez le bouton **Wire Nextcloud OnlyOffice**.

        N'accédez pas au domaine Collabora directement dans un navigateur -- il n'a pas d'interface utilisateur. Les utilisateurs ne le voient qu'à travers Nextcloud.
      extra_notes: ""

  - id: onlyoffice
    app_name: onlyoffice
    bench_pack: embedded
    upstream_url: https://www.onlyoffice.com/
    sso_mode: n/a
    domain_host: "office.{{ cloudflare_zone }}"
    domain_service: documentserver
    domain_port: 80
    compose_file: "compose/onlyoffice.compose.yml"
    env_defaults:
      - "JWT_SECRET={{ lookup('password', '/dev/null length=48 chars=ascii_letters,digits') }}"
    en:
      display_name: OnlyOffice
      what_it_is: Collaborative DOCX/XLSX/PPTX editing -- bolts into Nextcloud for real-time co-editing with high MS Office fidelity.
      replaces: ["Microsoft Office Online", "Google Docs (as embedded editor)"]
      compose_description: |
        Collaborative DOCX/XLSX/PPTX editor. Embedded in Nextcloud. Replaces Office 365 / Google Docs as the embedded editor.

        https://docs.catena.run/apps/onlyoffice/
      setup_steps: |
        1. Click **Deploy**. Wait ~1 min for the document server to boot.
        2. From the operator dashboard, click the **Wire Nextcloud OnlyOffice** button. The button installs the Nextcloud OnlyOffice app, reads the JWT secret from this template, points the app at this server, and -- if you previously had Collabora wired -- removes the Collabora Nextcloud app cleanly.
        3. Open any DOCX/XLSX/PPTX file in Nextcloud. It opens in the embedded OnlyOffice editor.

        Switching to Collabora later is one click: stop this OnlyOffice compose, deploy `collabora`, then click the **Wire Nextcloud Collabora** button.

        Don't visit the OnlyOffice domain directly in a browser -- it has no UI of its own. Users only ever see it through Nextcloud when they open a document.
      extra_notes: ""
    fr:
      display_name: OnlyOffice
      what_it_is: Édition collaborative DOCX/XLSX/PPTX -- s'intègre à Nextcloud pour la co-édition temps réel avec une haute fidélité aux formats MS Office.
      replaces: ["Microsoft Office Online", "Google Docs (éditeur embarqué)"]
      compose_description: |
        Éditeur collaboratif DOCX/XLSX/PPTX. Embarqué dans Nextcloud. Remplace Office 365 / Google Docs comme éditeur.

        https://docs.catena.run/apps/onlyoffice/
      setup_steps: |
        1. Cliquez **Deploy**. Patientez ~1 min le démarrage du Document Server.
        2. Depuis le tableau de bord opérateur, cliquez le bouton **Wire Nextcloud OnlyOffice**. Le bouton installe l'application Nextcloud OnlyOffice, lit la clé JWT depuis ce template, pointe l'application vers ce serveur, et -- si Collabora était précédemment câblé -- retire proprement l'application Nextcloud Collabora.
        3. Ouvrez n'importe quel fichier DOCX/XLSX/PPTX dans Nextcloud. Il s'ouvre dans l'éditeur OnlyOffice embarqué.

        Pour passer à Collabora plus tard : arrêtez ce conteneur OnlyOffice, déployez `collabora`, puis cliquez le bouton **Wire Nextcloud Collabora**.

        N'accédez pas au domaine OnlyOffice directement dans un navigateur -- il n'a pas d'interface utilisateur. Les utilisateurs ne le voient qu'à travers Nextcloud.
      extra_notes: ""

  - id: rocketchat-oidc
    app_name: rocketchat
    bench_pack: mongo
    upstream_url: https://www.rocket.chat/
    sso_mode: pre-wired
    domain_host: "chat.{{ cloudflare_zone }}"
    domain_service: rocketchat
    domain_port: 3000
    compose_file: "compose/rocketchat.compose.yml"
    # Per-template quiesce hooks. Rocket.Chat uses MongoDB; fsyncLock
    # flushes the journal + blocks writes while we snapshot, fsyncUnlock
    # releases. The lock blocks for the duration of the backup window
    # (typically seconds for Catena-sized stacks); operators with very
    # large RC instances should lengthen quiesce_timeout_seconds. The
    # snippet runs against whichever container `docker ps` finds for
    # the rocketchat-mongo service in the rocketchat compose project.
    quiesce_pre: "docker exec $(docker ps -q -f label=com.docker.compose.service=rocketchat-mongo -f label=com.docker.compose.project~=rocketchat | head -1) mongosh --quiet --eval 'db.fsyncLock()'"
    quiesce_post: "docker exec $(docker ps -q -f label=com.docker.compose.service=rocketchat-mongo -f label=com.docker.compose.project~=rocketchat | head -1) mongosh --quiet --eval 'db.fsyncUnlock()'"
    quiesce_timeout_seconds: 60
    # Bundled Jitsi env -- re-injected on every converge so a client
    # who edited the value in Dokploy UI cannot drift these out of
    # sync with the shared coturn secret in the vault. Matches the
    # `# === JITSI BEGIN ===` block in rocketchat.compose.yml.
    env_managed_keys:
      - VPS_PUBLIC_IP
      - TURN_STATIC_AUTH_SECRET
      - JITSI_PROSODY_PASSWORD
      - JITSI_JICOFO_AUTH_PASSWORD
      - JITSI_JICOFO_COMPONENT_SECRET
      - JITSI_JVB_AUTH_PASSWORD
    env_defaults:
      - "ROCKETCHAT_HOSTNAME=chat.{{ cloudflare_zone }}"
      # Used by the bundled Jitsi web UI for its PUBLIC_URL and by
      # JVB for JVB_TURN_HOST. compose interpolation does not have a
      # built-in "strip the leading rocketchat. label", so we render
      # the base zone explicitly here.
      - "ROCKETCHAT_HOSTNAME_BASE={{ cloudflare_zone }}"
      - "OIDC_BASE_URL=https://{{ keycloak_hostname | default('auth.' ~ cloudflare_zone) }}"
      # Bootstrap admin -- consumed by both Rocket.Chat itself
      # (creates the admin user on first boot) and by
      # rocketchat-jitsi-wire.sh (logs in as this user to flip the
      # Jitsi_* settings via REST). Password lives in the vault.
      - "ADMIN_USERNAME=admin"
      - "ADMIN_PASS={{ vault_admin_password }}"
      # Jitsi env -- shared coturn secret + per-component bearer
      # secrets minted in seed.py. Idle when the JITSI block is
      # commented out (RC keeps working as chat-only).
      - "VPS_PUBLIC_IP={{ public_ip }}"
      - "TURN_STATIC_AUTH_SECRET={{ vault_turn_static_auth_secret }}"
      - "JITSI_PROSODY_PASSWORD={{ vault_jitsi_prosody_password }}"
      - "JITSI_JICOFO_AUTH_PASSWORD={{ vault_jitsi_jicofo_auth_password }}"
      - "JITSI_JICOFO_COMPONENT_SECRET={{ vault_jitsi_jicofo_component_secret }}"
      - "JITSI_JVB_AUTH_PASSWORD={{ vault_jitsi_jvb_auth_password }}"
    en:
      display_name: Rocket.Chat
      what_it_is: Team chat -- channels, direct messages, file sharing, mobile apps, and video calls. Keycloak SSO pre-wired.
      replaces: ["Slack", "Microsoft Teams", "Discord (for work)"]
      compose_description: |
        Team chat + video. Keycloak SSO pre-wired. Replaces Slack / Microsoft Teams.

        https://docs.catena.run/apps/rocketchat-oidc/
      setup_steps: |
        1. Click **Deploy**. Nothing to fill in the Environment tab unless you want a different hostname.
        2. Wait ~5 minutes for the first sync. The login page will show **Sign in with Keycloak**.
        3. Sign in. The first user becomes the workspace admin.
        4. *(Optional, ~30 s)* Attach Nextcloud files in chats: Administration -> Apps -> Marketplace -> search `Nextcloud` -> install -> set your Nextcloud domain in the app settings. Users can then type `/nextcloud` in any chat to browse and attach files.
      extra_notes: |
        ### Mobile apps

        Rocket.Chat's iOS and Android apps connect straight to your server. Users paste `https://chat.<your-domain>` into the app on first launch and sign in via Keycloak.
    fr:
      display_name: Rocket.Chat
      what_it_is: Messagerie d'équipe -- canaux, messages directs, partage de fichiers, apps mobiles, appels vidéo. Keycloak SSO pré-câblé.
      replaces: ["Slack", "Microsoft Teams", "Discord (en usage pro)"]
      compose_description: |
        Messagerie d'équipe + vidéo. Keycloak SSO pré-câblé. Remplace Slack / Microsoft Teams.

        https://docs.catena.run/apps/rocketchat-oidc/
      setup_steps: |
        1. Cliquez **Deploy**. Rien à remplir dans l'onglet Environment sauf si vous voulez un autre nom de domaine.
        2. Patientez ~5 min pour la synchro initiale. La page de connexion affichera **Se connecter avec Keycloak**.
        3. Connectez-vous. Le premier utilisateur devient l'admin du workspace.
        4. *(Optionnel, ~30 s)* Joindre des fichiers Nextcloud : Administration -> Apps -> Marketplace -> cherchez `Nextcloud` -> installez -> indiquez votre domaine Nextcloud. Les utilisateurs tapent ensuite `/nextcloud` dans un chat pour parcourir et joindre leurs fichiers.
      extra_notes: |
        ### Applications mobiles

        Les apps iOS et Android de Rocket.Chat se connectent directement à votre serveur. Les utilisateurs collent `https://chat.<votre-domaine>` au premier lancement et se connectent via Keycloak.

  - id: element
    app_name: element
    bench_pack: postgres
    upstream_url: https://element.io/
    sso_mode: pre-wired
    domain_host: "element.{{ cloudflare_zone }}"
    domain_service: element-web
    domain_port: 80
    compose_file: "compose/element.compose.yml"
    # Element/Matrix ships across three publicly-reachable hostnames:
    #   element.<base>        -> the Element web client
    #   matrix.<base>         -> Synapse client API + .well-known
    #   synapseadmin.<base>   -> admin UI (operator tier, gated)
    #   elementmeet.<base>    -> bundled Jitsi (avoids collision with
    #                            rocketchat's meet.<base>)
    extra_domains:
      - host: "matrix.{{ cloudflare_zone }}"
        service: synapse
        port: 8008
      - host: "synapseadmin.{{ cloudflare_zone }}"
        service: synapse-admin
        port: 80
      - host: "elementmeet.{{ cloudflare_zone }}"
        service: jitsi-web
        port: 80
    # Per-template quiesce hooks. Synapse is postgres-backed; the
    # daily pg_dumpall already produces a consistent snapshot of the
    # DB regardless of in-flight HTTP writes, and the media_store/
    # volume on disk is append-only (per-event MXC files). No
    # synapse-side maintenance mode is needed; restic+pg_dumpall
    # together capture a clean point-in-time. Matches other
    # postgres-backed templates (docuseal, outline) that opt out of
    # an application-level quiesce.
    quiesce_pre: "true"
    quiesce_post: "true"
    quiesce_timeout_seconds: 5
    env_managed_keys:
      - OIDC_CLIENT_ID
      - OIDC_CLIENT_SECRET
      - OIDC_BASE_URL
      - VPS_PUBLIC_IP
      - TURN_HOSTNAME
      - TURN_STATIC_AUTH_SECRET
      - JITSI_JICOFO_AUTH_PASSWORD
      - JITSI_JICOFO_COMPONENT_SECRET
      - JITSI_JVB_AUTH_PASSWORD
      - JIGASI_XMPP_PASSWORD
    env_defaults:
      - "ELEMENT_HOSTNAME=element.{{ cloudflare_zone }}"
      - "MATRIX_HOSTNAME=matrix.{{ cloudflare_zone }}"
      - "ELEMENT_JITSI_HOSTNAME=elementmeet.{{ cloudflare_zone }}"
      # Synapse internal secrets -- minted once per deploy, persisted
      # in the postgres DB + homeserver.yaml. Operator-overridable.
      - "DB_PASSWORD={{ lookup('password', '/dev/null length=32 chars=ascii_letters,digits') }}"
      - "SYNAPSE_REGISTRATION_SHARED_SECRET={{ lookup('password', '/dev/null length=48 chars=ascii_letters,digits') }}"
      - "SYNAPSE_MACAROON_SECRET={{ lookup('password', '/dev/null length=48 chars=ascii_letters,digits') }}"
      - "SYNAPSE_FORM_SECRET={{ lookup('password', '/dev/null length=48 chars=ascii_letters,digits') }}"
      # Public open-registration off by default. Users come in via
      # Keycloak OIDC. Flip to "true" if a deployment wants
      # self-service signup with email verification.
      - "ALLOW_PUBLIC_REGISTRATION=false"
      # Federation closed by default. Comma-separated list of peers,
      # rendered as a YAML list inside homeserver.yaml. Empty string
      # -> empty list -> no federation. To open to matrix.org:
      # "\"matrix.org\""
      - "FEDERATION_DOMAIN_WHITELIST="
      # OIDC -- Keycloak. Same vault key family as the other apps;
      # env_managed_keys re-injects on every converge.
      - "OIDC_BASE_URL=https://{{ keycloak_hostname | default('auth.' ~ cloudflare_zone) }}"
      - "OIDC_CLIENT_ID=element"
      - "OIDC_CLIENT_SECRET={{ vault_element_oidc_client_secret }}"
      # Bundled Jitsi env. Shared coturn secret + per-component bearer
      # secrets. Identical pattern to rocketchat's bundled Jitsi.
      - "VPS_PUBLIC_IP={{ public_ip }}"
      - "TURN_HOSTNAME={{ coturn_hostname | default('turn.' ~ cloudflare_zone) }}"
      - "TURN_STATIC_AUTH_SECRET={{ vault_turn_static_auth_secret }}"
      - "JITSI_JICOFO_AUTH_PASSWORD={{ vault_element_jitsi_jicofo_auth_password }}"
      - "JITSI_JICOFO_COMPONENT_SECRET={{ vault_element_jitsi_jicofo_component_secret }}"
      - "JITSI_JVB_AUTH_PASSWORD={{ vault_element_jitsi_jvb_auth_password }}"
      - "JIGASI_XMPP_PASSWORD={{ vault_element_jigasi_xmpp_password }}"
      # SIP trunk -- operator fills these in the Environment tab once
      # they have a SIP provider account (Twilio / OVH / Bandwidth /
      # etc.). Empty values leave jigasi unregistered; the rest of
      # the stack still works (chat, voice, video, E2EE) -- only
      # phone dial-in to Jitsi rooms is off.
      - "JIGASI_SIP_URI="
      - "JIGASI_SIP_PASSWORD="
      - "JIGASI_SIP_SERVER="
    en:
      display_name: Element / Matrix
      what_it_is: Self-hosted Element + Matrix homeserver -- federated-capable team chat with end-to-end encryption, voice, group video (bundled Jitsi), and SIP dial-in.
      replaces: ["Slack", "Microsoft Teams", "Signal (for team use)", "Zoom (for small group calls)"]
      compose_description: |
        Element + Matrix homeserver. Chat (E2EE), voice, group video, SIP dial-in. Keycloak SSO pre-wired. Federation off by default.

        https://docs.catena.run/apps/element/
      setup_steps: |
        1. Click **Deploy**. First boot takes ~3 minutes (Synapse generates signing keys, postgres initialises, Jitsi components register).
        2. Open `element.<your-domain>` -- the Element web client opens. Click **Sign in with Keycloak**.
        3. The first Keycloak user lands as a regular Matrix user. To promote them to homeserver admin, open `synapseadmin.<your-domain>` (operator-only, gated by Keycloak admin group), find the user, and toggle the admin flag.
        4. *(Optional)* Enable SIP dial-in: fill `JIGASI_SIP_URI`, `JIGASI_SIP_PASSWORD`, `JIGASI_SIP_SERVER` in the Environment tab with your SIP provider's credentials, then redeploy. Without these, chat / voice / video still work -- only dial-in from a phone is off.
        5. *(Optional)* Open federation: edit `FEDERATION_DOMAIN_WHITELIST` in the Environment tab (e.g. `"matrix.org","example.com"`) and redeploy. Default is empty (no federation -- the homeserver only talks to itself).
      extra_notes: |
        ### End-to-end encryption

        New direct messages and new invite-only rooms are encrypted by default. Public rooms stay unencrypted (E2EE in large public rooms hurts mobile sync UX). Each user is prompted to set up **Secure Backup** the first time they log in -- this is a 24-character recovery key that lets them read encrypted history from a new device. Losing the key locks the user out of old encrypted messages; back it up the same way you back up a password manager.

        ### Voice and video

        - **1:1 calls** use the bundled Element/Matrix call stack and the shared TURN/STUN server at `turn.<your-domain>` for restrictive-network media relay.
        - **Group video calls** open in an embedded Jitsi widget at `elementmeet.<your-domain>` (the bundled Jitsi instance). Calls never leave your server -- there is no fallback to `meet.jit.si`.
        - **SIP dial-in** (jigasi) lets a regular phone dial a SIP number to join a Jitsi room. Enable by filling the `JIGASI_SIP_*` env vars (see step 4 above).

        ### Mobile apps

        Element's iOS and Android apps connect straight to your homeserver. Users tap **Use custom server** at first launch and enter `matrix.<your-domain>`. SSO via Keycloak works in-app.
    fr:
      display_name: Element / Matrix
      what_it_is: Element + serveur Matrix auto-hébergés -- messagerie d'équipe avec chiffrement de bout en bout, voix, visio de groupe (Jitsi embarqué), et entrée SIP par téléphone. Fédération capable mais désactivée par défaut.
      replaces: ["Slack", "Microsoft Teams", "Signal (en usage pro)", "Zoom (pour les petits appels de groupe)"]
      compose_description: |
        Element + serveur Matrix. Chat (E2EE), voix, visio de groupe, entrée SIP. SSO Keycloak pré-câblé. Fédération désactivée par défaut.

        https://docs.catena.run/apps/element/
      setup_steps: |
        1. Cliquez **Deploy**. Le premier démarrage prend ~3 min (Synapse génère ses clés de signature, postgres s'initialise, les composants Jitsi s'enregistrent).
        2. Ouvrez `element.<votre-domaine>` -- le client web Element s'ouvre. Cliquez **Se connecter avec Keycloak**.
        3. Le premier utilisateur Keycloak arrive comme utilisateur Matrix normal. Pour le promouvoir admin du homeserver, ouvrez `synapseadmin.<votre-domaine>` (réservé opérateur, protégé par le groupe admin Keycloak), trouvez l'utilisateur, et activez l'indicateur admin.
        4. *(Optionnel)* Activez l'entrée SIP : remplissez `JIGASI_SIP_URI`, `JIGASI_SIP_PASSWORD`, `JIGASI_SIP_SERVER` dans l'onglet Environment avec les identifiants de votre fournisseur SIP, puis redéployez. Sans ces valeurs, chat / voix / vidéo fonctionnent quand même -- seule l'entrée par téléphone est désactivée.
        5. *(Optionnel)* Ouvrez la fédération : éditez `FEDERATION_DOMAIN_WHITELIST` dans l'onglet Environment (ex : `"matrix.org","example.com"`) puis redéployez. Par défaut vide (pas de fédération -- le homeserver ne parle qu'à lui-même).
      extra_notes: |
        ### Chiffrement de bout en bout

        Les nouveaux messages directs et les nouveaux salons sur invitation sont chiffrés par défaut. Les salons publics restent en clair (le E2EE dans des salons publics nombreux dégrade la synchro mobile). Chaque utilisateur est invité à configurer le **Coffre-fort de récupération** lors de sa première connexion -- une clé de 24 caractères qui lui permet de lire l'historique chiffré depuis un nouvel appareil. Perdre la clé verrouille l'utilisateur hors de ses anciens messages chiffrés ; sauvegardez-la comme un mot de passe maître.

        ### Voix et vidéo

        - **Appels 1:1** utilisent le moteur d'appel Element/Matrix et le serveur TURN/STUN partagé `turn.<votre-domaine>` pour relayer les médias en réseau restrictif.
        - **Appels de groupe** s'ouvrent dans un widget Jitsi embarqué sur `elementmeet.<votre-domaine>` (l'instance Jitsi embarquée). Les appels ne quittent jamais votre serveur -- pas de repli sur `meet.jit.si`.
        - **Entrée SIP** (jigasi) permet à un téléphone classique d'appeler un numéro SIP pour rejoindre un salon Jitsi. Activez en remplissant les variables d'environnement `JIGASI_SIP_*` (voir étape 4 ci-dessus).

        ### Applications mobiles

        Les apps iOS et Android d'Element se connectent directement à votre homeserver. Les utilisateurs touchent **Utiliser un serveur personnalisé** au premier lancement et saisissent `matrix.<votre-domaine>`. La connexion via Keycloak fonctionne dans l'app.

  - id: docuseal
    app_name: docuseal
    bench_pack: postgres
    upstream_url: https://www.docuseal.com/
    sso_mode: post-deploy-ui
    domain_host: "sign.{{ cloudflare_zone }}"
    domain_service: docuseal
    domain_port: 3000
    compose_file: "compose/docuseal.compose.yml"
    env_defaults:
      - "DOCUSEAL_HOSTNAME=sign.{{ cloudflare_zone }}"
      - "SECRET_KEY_BASE={{ lookup('password', '/dev/null length=128 chars=hexdigits') | lower }}"
      - "DB_PASSWORD={{ lookup('password', '/dev/null length=32 chars=ascii_letters,digits') }}"
      - "SMTP_HOST="
      - "SMTP_PORT=587"
      - "SMTP_USERNAME="
      - "SMTP_PASSWORD="
      - "SMTP_FROM_ADDRESS="
      - "SMTP_AUTH=plain"
      # OIDC integration vars consumed by the post-deploy admin UI
      # toggle (Settings -> SSO). Not env-managed: DocuSeal persists
      # the values in its own DB once the admin saves them.
      - "OIDC_CLIENT_ID=docuseal"
      - "OIDC_CLIENT_SECRET="
      - "OIDC_ISSUER_URL=https://{{ keycloak_hostname | default('auth.' ~ cloudflare_zone) }}/realms/{{ keycloak_realm | default('vps') }}"
    en:
      display_name: DocuSeal
      what_it_is: Default document-signing app in the stack (replaces Documenso). Upload a PDF, place signature fields, send for signature. Audit trail +
        signed-PDF generation built-in.
      replaces: ["DocuSign", "HelloSign", "PandaDoc", "Adobe Sign"]
      compose_description: |
        Open-source document signing (default). Replaces DocuSign / HelloSign.

        https://docs.catena.run/apps/docuseal/
      setup_steps: |
        1. Click **Deploy**. Wait ~1 min for the first boot.
        2. Visit your DocuSeal domain and complete the first-run wizard (creates the initial admin account).
        3. *(Optional)* Enable Keycloak SSO: **Settings** -> **SSO** -> choose **OpenID Connect** -> paste:
           - **Client ID:** `OIDC_CLIENT_ID` from Environment (`docuseal`)
           - **Client Secret:** `OIDC_CLIENT_SECRET` from Environment (ask your operator to mint one in Keycloak if blank)
           - **Issuer URL:** `OIDC_ISSUER_URL`
           - Save. The login page gains a **Sign in with Keycloak** button. Local admin login keeps working as a break-glass.
        4. *(Optional)* Configure SMTP for signature-request emails: fill `SMTP_HOST`, `SMTP_PORT`, `SMTP_USERNAME`, `SMTP_PASSWORD`, `SMTP_FROM_ADDRESS` in the Environment tab and redeploy. Without SMTP, recipients only see pending requests in their DocuSeal dashboard.
      extra_notes: |
        ### Why DocuSeal is the default

        DocuSeal supersedes Documenso (still in the catalog under a deprecation banner). Faster boot, simpler signing-cert handling (no PKCS12 mint step on first deploy), and a maintained iOS/Android app. Documenso remains in catalog while existing clients migrate.

        ### Signing certificate

        DocuSeal generates signed PDFs out of the box without a separate signing-cert mint step. Adobe Acrobat shows the signature as cryptographically valid but with a "self-signed root" warning by default -- same caveat as Documenso. For legally-binding signatures, contact your operator to install a CA-issued cert via DocuSeal's admin UI (Settings -> Signature -> Certificates).

        ### SMTP

        Without SMTP configured, signature-request emails are not delivered. Recipients still see pending requests in their dashboard. To enable email, fill the `SMTP_*` env vars in the Environment tab.
    fr:
      display_name: DocuSeal
      what_it_is: Application de signature électronique par défaut de la stack (remplace Documenso). Téléversez un PDF, placez les champs de signature, envoyez
        pour signature. Piste d'audit + génération de PDF signé intégrées.
      replaces: ["DocuSign", "HelloSign", "PandaDoc", "Adobe Sign"]
      compose_description: |
        Signature électronique open-source (par défaut). Remplace DocuSign / HelloSign.

        https://docs.catena.run/apps/docuseal/
      setup_steps: |
        1. Cliquez **Deploy**. Patientez ~1 min pour le premier démarrage.
        2. Visitez votre domaine DocuSeal et complétez l'assistant initial (création du compte admin).
        3. *(Optionnel)* Activez Keycloak SSO : **Settings** -> **SSO** -> choisissez **OpenID Connect** -> collez :
           - **Client ID :** `OIDC_CLIENT_ID` depuis Environment (`docuseal`)
           - **Client Secret :** `OIDC_CLIENT_SECRET` depuis Environment (demandez à votre opérateur de le générer côté Keycloak si vide)
           - **Issuer URL :** `OIDC_ISSUER_URL`
           - Validez. La page de connexion affiche **Sign in with Keycloak**. La connexion admin locale continue de fonctionner comme issue de secours.
        4. *(Optionnel)* Configurez SMTP pour les e-mails de demande de signature : remplissez `SMTP_HOST`, `SMTP_PORT`, `SMTP_USERNAME`, `SMTP_PASSWORD`, `SMTP_FROM_ADDRESS` dans l'onglet Environment puis redéployez. Sans SMTP, les destinataires ne voient que les demandes en attente dans leur tableau de bord.
      extra_notes: |
        ### Pourquoi DocuSeal est par défaut

        DocuSeal remplace Documenso (toujours au catalogue avec un bandeau de dépréciation). Démarrage plus rapide, gestion du certificat de signature simplifiée (pas d'étape PKCS12 au premier déploiement), et apps iOS/Android maintenues. Documenso reste au catalogue le temps que les clients existants migrent.

        ### Certificat de signature

        DocuSeal génère des PDF signés d'emblée sans étape de génération de certificat. Adobe Acrobat affiche la signature comme cryptographiquement valide mais avec un avertissement "racine auto-signée" par défaut -- même limite que Documenso. Pour des signatures à valeur légale, contactez votre opérateur pour installer un certificat émis par une AC via l'UI admin DocuSeal (Settings -> Signature -> Certificates).

        ### SMTP

        Sans SMTP configuré, les e-mails de demande de signature ne sont pas envoyés. Les destinataires voient les demandes en attente dans leur tableau de bord. Pour activer les e-mails, renseignez les variables `SMTP_*` dans l'onglet Environment.

