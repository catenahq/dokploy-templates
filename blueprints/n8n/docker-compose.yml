# n8n -- workflow automation (Zapier / Make alternative). Community
# edition uses local email/password user management. OIDC/SAML are
# enterprise-only, so per-user app-local logins here.

services:
  n8n:
    image: n8nio/n8n:2.19.5
    restart: unless-stopped
    environment:
      N8N_HOST: ${N8N_HOSTNAME}
      WEBHOOK_URL: https://${N8N_HOSTNAME}/
      N8N_EDITOR_BASE_URL: https://${N8N_HOSTNAME}/
      N8N_PROTOCOL: https
      N8N_PORT: "5678"
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      N8N_USER_MANAGEMENT_JWT_SECRET: ${N8N_JWT_SECRET}
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: db
      DB_POSTGRESDB_PORT: "5432"
      DB_POSTGRESDB_DATABASE: n8n
      DB_POSTGRESDB_USER: n8n
      DB_POSTGRESDB_PASSWORD: ${DB_PASSWORD}
      GENERIC_TIMEZONE: ${N8N_TIMEZONE}
      N8N_DIAGNOSTICS_ENABLED: "false"
      N8N_HIRING_BANNER_ENABLED: "false"
      N8N_RUNNERS_ENABLED: "true"
    volumes:
      - n8n-data:/home/node/.n8n
    depends_on:
      db:
        condition: service_healthy
    labels:
      - "vps.auth.mode=public"
      - "vps.auto-update=patch"
    networks:
      dokploy-network:
        aliases:
          - n8n
      default: {}

  db:
    image: postgres:16.13-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: n8n
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: n8n
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U n8n"]
      interval: 10s
      timeout: 5s
      retries: 5
    labels:
      - "vps.auto-update=patch"
    networks:
      - default

volumes:
  n8n-data:
  db-data:

networks:
  dokploy-network:
    external: true
