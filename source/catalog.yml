  - id: easyappointments
    app_name: easyappointments
    bench_pack: mariadb
    upstream_url: https://easyappointments.org/
    sso_mode: none
    domain_host: "book.{{ cloudflare_zone }}"
    domain_service: easyappointments
    domain_port: 80
    compose_file: "compose/easyappointments.compose.yml"
    env_defaults:
      - "EASYAPPOINTMENTS_HOSTNAME=book.{{ cloudflare_zone }}"
      - "DB_PASSWORD={{ lookup('password', '/dev/null length=32 chars=ascii_letters,digits') }}"
      - "DB_ROOT_PASSWORD={{ lookup('password', '/dev/null length=32 chars=ascii_letters,digits') }}"
    en:
      display_name: Easy!Appointments
      what_it_is: Customer-facing booking app for one or many providers (clinic, salon, lessons, repair shop). Public booking page; staff calendars; email + SMS reminders; ICS export.
      replaces: ["Calendly", "Acuity", "SimplyBook", "Setmore"]
      compose_description: |
        Open-source customer booking app. One or many providers, public booking page, ICS sync. Replaces Calendly / Acuity.

        https://docs.catena.run/apps/easyappointments/
      setup_steps: |
        1. Click **Deploy**. Wait ~1 min for the first boot (database initializes on first run).
        2. Visit your Easy!Appointments domain and complete the first-run installer (creates the initial admin account, business name, working hours).
        3. Add providers (staff with bookable calendars), services (durations + prices), and customers as needed.
        4. *(Optional)* Configure SMTP under **Settings** -> **Business Logic** -> **Email** to send appointment confirmations and reminders. Without SMTP, customers and staff still see bookings inside the app, but no emails go out.
        5. *(Optional)* Embed the booking page on your website: copy the public booking URL from **Settings** -> **Booking Settings** and link to it from your site or business listings.
      extra_notes: |
        ### Authentication

        Easy!Appointments v1.5.2 uses local email/password sign-in for staff. No native OIDC in the upstream release. The customer-facing booking page is public by design -- visitors book a slot without creating an account, only providing name, email, and phone. The SSO gap therefore only affects staff sign-in and is typically manageable for the small teams (1-10 staff) the app targets.

        If a single sign-on for staff is required, contact your operator to discuss an oauth2-proxy front layer; default deployment ships with local accounts.

        ### Email + SMS reminders

        Email reminders work as soon as SMTP is configured. SMS reminders require a Twilio account (configured under **Settings** -> **Notifications** -> **SMS**). SMS is opt-in per customer at booking time.

        ### Public booking URL

        The default public URL is `https://book.<your-domain>/`. Share this directly with customers, embed it as a button on your business website, or list it on Google Business Profile.
    fr:
      display_name: Easy!Appointments
      what_it_is: Application de réservation côté client pour un ou plusieurs prestataires (clinique, salon, cours, atelier de réparation). Page de réservation publique ; calendriers du personnel ; rappels courriel + SMS ; export ICS.
      replaces: ["Calendly", "Acuity", "SimplyBook", "Setmore"]
      compose_description: |
        Application de réservation client open-source. Un ou plusieurs prestataires, page publique, synchronisation ICS. Remplace Calendly / Acuity.

        https://docs.catena.run/apps/easyappointments/
      setup_steps: |
        1. Cliquez **Deploy**. Patientez ~1 min pour le premier démarrage (la base de données s'initialise au premier lancement).
        2. Visitez votre domaine Easy!Appointments et complétez l'assistant initial (compte admin, nom de l'entreprise, heures d'ouverture).
        3. Ajoutez les prestataires (membres du personnel avec calendriers réservables), les services (durées + prix), et les clients au besoin.
        4. *(Optionnel)* Configurez SMTP sous **Settings** -> **Business Logic** -> **Email** pour envoyer les confirmations et rappels de rendez-vous. Sans SMTP, les clients et le personnel voient les réservations dans l'application, mais aucun courriel n'est envoyé.
        5. *(Optionnel)* Intégrez la page de réservation à votre site web : copiez l'URL publique depuis **Settings** -> **Booking Settings** et liez-la depuis votre site ou vos fiches d'établissement.
      extra_notes: |
        ### Authentification

        Easy!Appointments v1.5.2 utilise une connexion locale par courriel/mot de passe pour le personnel. Pas d'OIDC natif dans la version upstream. La page de réservation côté client est publique par conception -- les visiteurs réservent un créneau sans compte, en fournissant seulement leur nom, courriel et téléphone. L'absence de SSO ne touche donc que la connexion du personnel et reste gérable pour les petites équipes (1 à 10 personnes) ciblées par l'application.

        Si un SSO unifié pour le personnel est requis, contactez votre opérateur pour discuter d'un proxy oauth2 en façade ; le déploiement par défaut utilise des comptes locaux.

        ### Rappels courriel + SMS

        Les rappels par courriel fonctionnent dès que SMTP est configuré. Les rappels SMS nécessitent un compte Twilio (configuré sous **Settings** -> **Notifications** -> **SMS**). Les SMS sont consentis par le client au moment de la réservation.

        ### URL de réservation publique

        L'URL publique par défaut est `https://book.<votre-domaine>/`. Partagez-la directement avec vos clients, intégrez-la comme bouton sur votre site web, ou listez-la sur votre fiche Google Business.

  - id: mautic
    app_name: mautic
    bench_pack: mariadb
    upstream_url: https://www.mautic.org/
    sso_mode: none
    domain_host: "marketing.{{ cloudflare_zone }}"
    domain_service: mautic_web
    domain_port: 80
    compose_file: "compose/mautic.compose.yml"
    env_defaults:
      - "MAUTIC_HOSTNAME=marketing.{{ cloudflare_zone }}"
      - "DB_PASSWORD={{ lookup('password', '/dev/null length=32 chars=ascii_letters,digits') }}"
      - "DB_ROOT_PASSWORD={{ lookup('password', '/dev/null length=32 chars=ascii_letters,digits') }}"
      # SMTP is consumed via the post-deploy admin UI (Settings ->
      # Configuration -> Email Settings). Exposed here so the operator
      # can paste managed-relay creds without editing compose.
      - "SMTP_HOST="
      - "SMTP_PORT=587"
      - "SMTP_USERNAME="
      - "SMTP_PASSWORD="
      - "SMTP_FROM_ADDRESS="
    en:
      display_name: Mautic
      what_it_is: Open-source marketing automation. Contact segments, email campaigns, drip sequences, landing pages, forms, lead scoring. Replaces Mailchimp /
        ActiveCampaign / HubSpot Marketing.
      replaces: ["Mailchimp", "ActiveCampaign", "HubSpot Marketing", "Brevo (Sendinblue)"]
      compose_description: |
        Open-source marketing automation. Drip campaigns, segments, landing pages. Replaces Mailchimp / ActiveCampaign.

        https://docs.catena.run/apps/mautic/
      setup_steps: |
        1. Click **Deploy**. Wait ~2 min for the first boot (database migrations run on first start).
        2. Visit your Mautic domain and complete the first-run wizard:
           - **Database**: pre-filled (host `db`, name `mautic`, user `mautic`, password from the `DB_PASSWORD` env var).
           - **Admin user**: create your initial admin account.
           - **Email settings**: paste your managed-relay SMTP creds (host, port `587`, username, password, from-address). Skip if you'll do this later under **Settings** -> **Configuration** -> **Email Settings**.
        3. Verify the cron + worker containers are running in Dokploy (Mautic needs `mautic_cron` for scheduled campaigns + `mautic_worker` for the email queue).
        4. Build your first segment: **Segments** -> **New** -> filter by contact attribute.
        5. Build your first email campaign: **Campaigns** -> **New** -> drag the **Send email** action onto a segment trigger.
      extra_notes: |
        ### Authentication

        Mautic community edition does not ship native OIDC. Local username/password is the default. SAML2 is supported upstream but requires per-deploy config; third-party generic-OAuth2 plugins exist. If single sign-on across the stack is required, contact your operator to add an oauth2-proxy front layer (Keycloak group `client-staff` gates access at the Traefik edge before traffic reaches Mautic).

        ### SMTP and sending reputation

        Mautic does NOT send email directly. It hands every outbound to your managed SMTP relay (see the [email providers guide](/en/guides/email-providers/) for recommended choices). Sending reputation, SPF/DKIM/DMARC, and bounce handling all live at the relay layer. Configure SMTP under **Settings** -> **Configuration** -> **Email Settings** with your relay's credentials before the first campaign goes out.

        ### Lead-magnet content and drip-campaign copy

        The template ships the engine. Authoring the lead-magnet PDFs, drip-sequence copy, and email templates is your team's job (or your operator's, if they offer marketing-content services). Mautic itself does not ship pre-built campaigns.

        ### Resource note

        Mautic runs as Apache + MariaDB + a worker sidecar + a cron sidecar. Plan for ~1.5 GB RAM at idle (worker + cron eat ~300 MB each), ~3 GB under campaign sends or segment rebuilds. Storage grows with media uploads and email-event history; budget ~10 GB after the first year of regular use.
    fr:
      display_name: Mautic
      what_it_is: Automatisation marketing open-source. Segments de contacts, campagnes courriel, séquences drip, pages de destination, formulaires, scoring de
        prospects. Remplace Mailchimp / ActiveCampaign / HubSpot Marketing.
      replaces: ["Mailchimp", "ActiveCampaign", "HubSpot Marketing", "Brevo (Sendinblue)"]
      compose_description: |
        Automatisation marketing open-source. Séquences drip, segments, pages de destination. Remplace Mailchimp / ActiveCampaign.

        https://docs.catena.run/apps/mautic/
      setup_steps: |
        1. Cliquez **Deploy**. Patientez ~2 min pour le premier démarrage (les migrations de base s'exécutent au premier lancement).
        2. Visitez votre domaine Mautic et complétez l'assistant initial :
           - **Base de données** : pré-remplie (hôte `db`, nom `mautic`, utilisateur `mautic`, mot de passe depuis la variable `DB_PASSWORD`).
           - **Utilisateur admin** : créez votre compte admin initial.
           - **Paramètres courriel** : collez les identifiants SMTP de votre relais géré (hôte, port `587`, nom d'utilisateur, mot de passe, adresse expéditeur). Sautez cette étape si vous préférez la configurer plus tard sous **Settings** -> **Configuration** -> **Email Settings**.
        3. Vérifiez que les conteneurs cron + worker tournent dans Dokploy (Mautic a besoin de `mautic_cron` pour les campagnes planifiées + `mautic_worker` pour la file d'envoi).
        4. Créez votre premier segment : **Segments** -> **New** -> filtrez par attribut de contact.
        5. Créez votre première campagne : **Campaigns** -> **New** -> glissez l'action **Send email** sur un déclencheur de segment.
      extra_notes: |
        ### Authentification

        Mautic édition communautaire ne fournit pas d'OIDC natif. Connexion locale par nom d'utilisateur/mot de passe par défaut. SAML2 est supporté en amont mais demande une configuration par déploiement ; des plugins OAuth2 génériques tiers existent. Si un SSO unifié pour la stack est requis, contactez votre opérateur pour ajouter une couche oauth2-proxy en façade (le groupe Keycloak `client-staff` filtre l'accès au niveau Traefik avant que le trafic n'atteigne Mautic).

        ### SMTP et réputation d'envoi

        Mautic n'envoie PAS directement les courriels. Il remet chaque envoi à votre relais SMTP géré (voir le [guide des fournisseurs courriel](/guides/email-providers/) pour les choix recommandés). Réputation d'envoi, SPF/DKIM/DMARC, et gestion des rebonds vivent au niveau du relais. Configurez SMTP sous **Settings** -> **Configuration** -> **Email Settings** avec les identifiants de votre relais avant la première campagne.

        ### Contenu d'aimant à prospects et copie des séquences drip

        Le template fournit le moteur. La rédaction des PDF d'aimants, des séquences drip et des modèles d'envoi est le travail de votre équipe (ou de votre opérateur, s'il offre des services de contenu marketing). Mautic lui-même ne livre aucune campagne pré-bâtie.

        ### Ressources

        Mautic tourne en Apache + MariaDB + un worker sidecar + un cron sidecar. Prévoyez ~1.5 GB RAM au repos (worker + cron consomment ~300 MB chacun), ~3 GB sous envois de campagne ou reconstruction de segments. Le stockage croît avec les uploads de médias et l'historique des événements courriel ; budgétez ~10 GB après la première année d'usage régulier.
